# Build AERA bundles for Windows, macOS, and Linux on every `v*` tag,
# then attach the bundles + installers to a GitHub Release.
#
# Trigger:
#   git tag v0.1.0 && git push --tags
#
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # needed to create the Release

jobs:
  # ─────────────────────────────────────────────────────────── #
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ─── system deps PySide6 / cairosvg need on Linux ─── #
      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon0 libegl1 libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libcairo2-dev libpango1.0-dev portaudio19-dev

      - name: macOS system deps
        if: matrix.os == 'macos-latest'
        run: brew install cairo pango portaudio create-dmg

      # ─── install Python deps ─── #
      - name: Install AERA + build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller>=6.0 pillow>=10 cairosvg>=2.7

      # ─── PyInstaller ─── #
      - name: Build bundle
        run: python build_tools/build.py --no-install-deps

      # ─── OS-specific installer ─── #
      - name: Package DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: python build_tools/build.py --no-install-deps --no-icons --installer

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress -y

      - name: Package installer (Windows)
        if: matrix.os == 'windows-latest'
        run: python build_tools/build.py --no-install-deps --no-icons --installer

      - name: Install appimagetool (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Package AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: python build_tools/build.py --no-install-deps --no-icons --installer

      # ─── compress + upload artifacts ─── #
      - name: Compress bundle
        shell: bash
        run: |
          cd dist
          case "${{ matrix.os }}" in
            windows-latest) 7z a AERA-windows-x64.zip AERA/ ;;
            macos-latest)   zip -r AERA-macos.zip AERA.app ;;
            ubuntu-latest)  tar czf AERA-linux-x64.tar.gz AERA/ ;;
          esac

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: AERA-${{ matrix.os }}
          path: |
            dist/AERA-*.zip
            dist/AERA-*.tar.gz
            dist/AERA-*.AppImage
            dist/AERA-Setup.exe
            dist/AERA.dmg
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────── #
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name "*.zip" -o -name "*.tar.gz" -o \
               -name "*.AppImage" -o -name "*.exe" -o -name "*.dmg" \) \
            -exec mv {} release/ \;
          ls -la release/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: AERA Agent ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
