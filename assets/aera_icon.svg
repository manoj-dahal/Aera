<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7fd4ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#1da1ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0078d4" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#1da1ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1da1ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1da1ff"/>
      <stop offset="50%" stop-color="#7fd4ff"/>
      <stop offset="100%" stop-color="#ff7a1a"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="#0d1b2a" stroke="#1da1ff" stroke-width="6"/>

  <!-- outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- orbit ring (tilted) -->
  <ellipse cx="256" cy="256" rx="180" ry="60"
           fill="none" stroke="url(#ring)" stroke-width="4"
           transform="rotate(-22 256 256)"/>

  <!-- inner orb -->
  <circle cx="256" cy="256" r="120" fill="url(#orb)"/>

  <!-- particle dots around the orb -->
  <g fill="#ffffff">
    <circle cx="180" cy="200" r="3"/>
    <circle cx="320" cy="180" r="2.5"/>
    <circle cx="360" cy="260" r="3.5"/>
    <circle cx="200" cy="320" r="2"/>
    <circle cx="280" cy="340" r="3"/>
    <circle cx="160" cy="260" r="2.5"/>
    <circle cx="340" cy="320" r="2"/>
  </g>

  <!-- AERA monogram -->
  <text x="256" y="448"
        font-family="'Segoe UI','Inter','Arial Black',sans-serif"
        font-size="64" font-weight="900" letter-spacing="6"
        text-anchor="middle" fill="#ffffff">AERA</text>
</svg>
