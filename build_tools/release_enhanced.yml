# Build AERA bundles for Windows, macOS, and Linux on every `v*` tag,
# then attach the bundles + installers to a GitHub Release.
#
# Produces per OS:
#   Windows: AERA/ (folder), AERA.exe (onefile), AERA-Setup.exe (Inno), AERA.msi (WiX if available), ZIP, pyz
#   macOS:   AERA.app, AERA.dmg, AERA.pkg, ZIP, pyz
#   Linux:   AERA/, AERA-x86_64.AppImage, AERA_amd64.deb, tar.gz, ZIP, pyz
#
# Trigger:
#   git tag v0.1.0 && git push --tags
#
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # needed to create the Release

jobs:
  # ─────────────────────────────────────────────────────────── #
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ─── system deps ─── #
      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon0 libegl1 libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libcairo2-dev libpango1.0-dev portaudio19-dev \
            libpython3.12-dev dpkg-dev rpm || true

      - name: macOS system deps
        if: matrix.os == 'macos-latest'
        run: brew install cairo pango portaudio create-dmg

      - name: Windows system deps
        if: matrix.os == 'windows-latest'
        run: |
          choco install innosetup --no-progress -y
          choco install wixtoolset --no-progress -y || echo "WiX optional"

      # ─── install Python deps ─── #
      - name: Install AERA + build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[audio]" 
          python -m pip install pyinstaller>=6.0 pillow>=10 cairosvg>=2.7 shiv>=1.0

      # ─── Build onedir bundle ─── #
      - name: Build onedir bundle
        run: python build_tools/build.py --no-install-deps

      # ─── Build onefile exe ─── #
      - name: Build onefile exe
        run: python build_tools/build.py --no-install-deps --no-icons --onefile

      # ─── Build shiv pyz (fallback, no libpython needed) ─── #
      - name: Build shiv pyz
        shell: bash
        run: |
          python -m shiv -c aera-gui -o dist/AERA.pyz . --reproducible --compressed || true
          python -m shiv -c aera-cli -o dist/AERA-cli.pyz . --reproducible --compressed || true
          ls -lh dist/*.pyz || true

      # ─── OS-specific installers ─── #
      - name: Install appimagetool (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Build all installers for this OS
        run: python build_tools/build.py --no-install-deps --no-icons --installer

      - name: Linux extra packages (deb, tar.gz, rpm)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          python build_tools/build.py --no-install-deps --no-icons --all || true
          # fpm for rpm if available
          sudo gem install fpm || true
          python build_tools/build.py --no-install-deps --no-icons --installer || true
          ls -lh dist/

      # ─── compress + upload artifacts ─── #
      - name: Compress bundle
        shell: bash
        run: |
          cd dist
          case "${{ matrix.os }}" in
            windows-latest)
              7z a AERA-windows-x64.zip AERA/ || zip -r AERA-windows-x64.zip AERA/
              ;;
            macos-latest)
              zip -r -y AERA-macos.zip AERA.app || true
              ;;
            ubuntu-latest)
              tar czf AERA-linux-x64.tar.gz AERA/ || true
              ;;
          esac
          ls -lh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: AERA-${{ matrix.os }}
          path: |
            dist/AERA*.zip
            dist/AERA*.tar.gz
            dist/AERA*.AppImage
            dist/AERA*.deb
            dist/AERA*.rpm
            dist/AERA*.exe
            dist/AERA*.msi
            dist/AERA*.dmg
            dist/AERA*.pkg
            dist/AERA*.pyz
            dist/*.whl
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────── #
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name "*.zip" -o -name "*.tar.gz" -o \
               -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.pyz" -o -name "*.whl" \) \
            -exec mv {} release/ \; || true
          ls -lh release/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: AERA Agent ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
